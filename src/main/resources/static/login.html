<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema - Gestão de Depósito</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-body-bg">

<div class="login-card">
    <div class="login-header">
        <i class="fas fa-hard-hat icon-large"></i>
        <h1>Painel de Gestão</h1>
    </div>

    <div class="login-content">
        <div id="mensagemErro" class="erro-login">
            <i class="fas fa-exclamation-triangle me-2"></i> Usuário ou senha incorretos.
        </div>

        <form action="/login" method="POST">
            <div class="mb-4">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" id="username" name="username" class="form-control form-control-lg" placeholder="Ex: admin" required autofocus>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" name="password" class="form-control form-control-lg" placeholder="Sua senha secreta" required>
            </div>

            <button type="submit" class="btn btn-login w-100 shadow-sm">
                ENTRAR <i class="fas fa-sign-in-alt ms-2"></i>
            </button>
        </form>
    </div>
</div>

<script src="/js/Login.js"></script>
</body>
</html>
