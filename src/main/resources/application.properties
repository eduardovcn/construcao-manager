spring.application.name=MateriaisConstrucao

# ==========================================
# CONFIGURA«√O DO BANCO DE DADOS MYSQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/construcaomanager?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=eduardovcn
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURA«’ES DO JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURA«’ES DE CARGA INICIAL DE DADOS
# ==========================================
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ==========================================
# CONFIGURA«’ES DE BACKUP E E-MAIL (GMAIL)
# ==========================================
app.backup.cron=0 59 23 * * *
# O e-mail que VAI RECEBER o backup (o e-mail do dono/empresa)
app.backup.email-destino=email.da.empresa@gmail.com

spring.mail.host=smtp.gmail.com
spring.mail.port=587
# O e-mail que VAI ENVIAR o backup (pode ser o da prÛpria empresa ou um criado sÛ para o sistema)
spring.mail.username=seu.email.remetente@gmail.com
# A Senha de App gerada no painel do Google (n„o use a senha normal)
spring.mail.password=sua_senha_de_app_aqui
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

