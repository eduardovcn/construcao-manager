spring.application.name=MateriaisConstrucao

# ==========================================
# CONFIGURA«√O DO BANCO DE DADOS POSTGRESQL
# ==========================================
# O Postgres roda nativamente na porta 5432
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/construcaomanager}
# O usu·rio padr„o do Postgres geralmente se chama 'postgres' (e n„o 'root')
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:sua_senha_local_do_postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# CONFIGURA«’ES DO JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
# Define o dialeto para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MantÈm a carga inicial do data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ==========================================
# CONFIGURA«’ES DE BACKUP E E-MAIL (GMAIL)
# ==========================================
app.backup.cron=0 59 23 * * *
# O e-mail que VAI RECEBER o backup (o e-mail do dono/empresa)
app.backup.email-destino=lmconstrucoes90@gmail.com

spring.mail.host=smtp.gmail.com
spring.mail.port=587
# O e-mail que VAI ENVIAR o backup (pode ser o da prÛpria empresa ou um criado sÛ para o sistema)
spring.mail.username=lmconstrucoes90@gmail.com
# A Senha de App gerada no painel do Google (n„o use a senha normal)
spring.mail.password=sua_senha_de_app_aqui
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

